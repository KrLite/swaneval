services:
  postgres:
    image: postgres:14
    container_name: evalscope-postgres
    environment:
      POSTGRES_USER: evalscope
      POSTGRES_PASSWORD: evalscope
      POSTGRES_DB: evalscope
    ports:
      - "6001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evalscope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evalscope-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://evalscope:evalscope@postgres:5432/evalscope"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
