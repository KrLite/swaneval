services:
  # ── 基础设施 ──

  postgres:
    image: postgres:14
    container_name: evalscope-postgres
    environment:
      POSTGRES_USER: evalscope
      POSTGRES_PASSWORD: evalscope
      POSTGRES_DB: evalscope
    ports:
      - "6001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evalscope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evalscope-backend
    ports:
      - "8000:8000"
    volumes:
      - evalscope_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://evalscope:evalscope@postgres:5432/evalscope"
      DATABASE_URL_SYNC: "postgresql://evalscope:evalscope@postgres:5432/evalscope"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["http://localhost:3000"]'
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
      # 模型 API key 通过前端界面添加模型时填写，存入数据库。
      # 无需在此配置。
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evalscope-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
    depends_on:
      - backend
    restart: unless-stopped

  # ── 可选服务（需要 --profile 启用）──

  # 本地模型推理: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    container_name: evalscope-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  # S3 对象存储: docker compose --profile s3 up
  minio:
    image: minio/minio:latest
    container_name: evalscope-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - s3

volumes:
  postgres_data:
  evalscope_data:
  ollama_data:
  minio_data:
