services:
  postgres:
    image: postgres:14
    container_name: evalscope-postgres
    environment:
      POSTGRES_USER: evalscope
      POSTGRES_PASSWORD: evalscope
      POSTGRES_DB: evalscope
    ports:
      - "6001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evalscope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: evalscope-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - s3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evalscope-backend
    ports:
      - "8000:8000"
    volumes:
      - evalscope_data:/data
    environment:
      DATABASE_URL: "postgresql://evalscope:evalscope@postgres:5432/evalscope"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["http://localhost:3000"]'
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
      # S3 mode (use with: docker compose --profile s3 up):
      # STORAGE_BACKEND: s3
      # S3_BUCKET: evalscope
      # S3_ENDPOINT_URL: http://minio:9000
      # S3_ACCESS_KEY: minioadmin
      # S3_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  evalscope_data:
  minio_data:
